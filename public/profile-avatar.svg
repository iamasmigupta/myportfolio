<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="100" cy="75" r="32" fill="url(#grad1)"/>
  
  <!-- Body -->
  <path d="M 45 160 Q 45 115 100 115 Q 155 115 155 160" fill="url(#grad1)"/>
  
  <!-- Laptop/code icon -->
  <rect x="78" y="130" rx="3" ry="3" width="44" height="28" fill="#1e1b4b" opacity="0.6"/>
  <text x="100" y="149" text-anchor="middle" fill="#a78bfa" font-size="14" font-family="monospace">&lt;/&gt;</text>
  
  <!-- Decorative elements -->
  <circle cx="145" cy="55" r="4" fill="#a78bfa" opacity="0.8"/>
  <circle cx="55" cy="140" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="160" cy="130" r="3" fill="#818cf8" opacity="0.7"/>
</svg>
